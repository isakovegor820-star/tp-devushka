<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI-юрист — тест бэкенда</title>
<style>
  :root { color-scheme: light dark; }
  body { font: 16px/1.5 system-ui, sans-serif; max-width: 720px; margin: 0 auto; padding: 24px; }
  h1 { font-size: 20px; }
  #log { border: 1px solid #8883; border-radius: 12px; padding: 16px; min-height: 240px; white-space: pre-wrap; }
  .msg { margin: 0 0 14px; }
  .role { font-weight: 600; opacity: .7; font-size: 13px; }
  form { display: flex; gap: 8px; margin-top: 12px; }
  input { flex: 1; padding: 10px 12px; border-radius: 10px; border: 1px solid #8886; font: inherit; }
  button { padding: 10px 16px; border-radius: 10px; border: 0; background: #2d6cdf; color: #fff; font: inherit; cursor: pointer; }
  button:disabled { opacity: .5; cursor: default; }
</style>
</head>
<body>
  <h1>AI-юрист «Девушка» — тест бэкенда</h1>
  <div id="log"></div>
  <form id="f">
    <input id="q" placeholder="Задайте правовой вопрос…" autocomplete="off" />
    <button id="send">Отправить</button>
  </form>

<script>
const API = location.origin + '/api/chat';
const log = document.getElementById('log');
const form = document.getElementById('f');
const input = document.getElementById('q');
const btn = document.getElementById('send');
const history = [];

function addMsg(role, text) {
  const wrap = document.createElement('div');
  wrap.className = 'msg';
  wrap.innerHTML = '<div class="role"></div><div class="body"></div>';
  wrap.querySelector('.role').textContent = role === 'user' ? 'Вы' : 'AI-юрист';
  wrap.querySelector('.body').textContent = text;
  log.appendChild(wrap);
  log.scrollTop = log.scrollHeight;
  return wrap.querySelector('.body');
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  btn.disabled = true;
  addMsg('user', text);
  history.push({ role: 'user', content: text });

  const out = addMsg('assistant', '');
  let acc = '';
  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history }),
    });
    if (!res.ok || !res.body) {
      out.textContent = 'Ошибка: ' + res.status;
      btn.disabled = false;
      return;
    }
    const reader = res.body.getReader();
    const dec = new TextDecoder();
    let buf = '';
    for (;;) {
      const { value, done } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const parts = buf.split('\n\n');
      buf = parts.pop();
      for (const part of parts) {
        const line = part.replace(/^data: /, '');
        if (!line) continue;
        const ev = JSON.parse(line);
        if (ev.type === 'delta') { acc += ev.text; out.textContent = acc; log.scrollTop = log.scrollHeight; }
        else if (ev.type === 'error') { out.textContent = '⚠ ' + ev.error; }
      }
    }
    if (acc) history.push({ role: 'assistant', content: acc });
  } catch (err) {
    out.textContent = '⚠ ' + err.message;
  } finally {
    btn.disabled = false;
    input.focus();
  }
});
</script>
</body>
</html>
