document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

· engineering HUD\n   ============================================================ */\n:root{\n  --bg:#070a12;\n  --bg-2:#0a0e18;\n  --cyan:#00E5FF;\n  --cyan-deep:#0086B3;\n  --magenta:#FF2E9A;\n  --t1:#F2F5F9;\n  --t2:#AEB6C4;\n  --t3:#8891A3;\n  --line:rgba(255,255,255,.09);\n  --line-2:rgba(255,255,255,.055);\n  --glass:rgba(255,255,255,.028);\n  --glass-2:rgba(255,255,255,.045);\n  --f-head:'Manrope',system-ui,sans-serif;\n  --f-mono:'JetBrains Mono',ui-monospace,monospace;\n  --f-body:'Inter',system-ui,sans-serif;\n  --ease:cubic-bezier(.22,.61,.36,1);\n  --ease-out:cubic-bezier(.16,1,.3,1);\n  --maxw:1200px;\n}\n*,*::before,*::after{box-sizing:border-box}\nhtml{scroll-behavior:smooth;scroll-padding-top:92px;-webkit-text-size-adjust:100%;overflow-x:hidden}\nbody{\n  margin:0;background:var(--bg);color:var(--t1);\n  font-family:var(--f-body);font-size:16px;line-height:1.6;\n  overflow-x:hidden;position:relative;min-height:100vh;\n  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;\n}\nimg{max-width:100%;display:block}\na{color:inherit;text-decoration:none}\nbutton{font-family:inherit;cursor:pointer}\nul{margin:0;padding:0;list-style:none}\nh1,h2,h3,h4{font-family:var(--f-head);font-weight:700;line-height:1.08;margin:0;letter-spacing:-.02em;text-wrap:balance}\np{margin:0}\n::selection{background:rgba(0,229,255,.28);color:#fff}\n\n/* ---- focus a11y ---- */\n:focus-visible{outline:2px solid var(--cyan);outline-offset:3px;border-radius:3px}\n\n/* ---- background layers ---- */\n.bg-glow{position:fixed;z-index:-4;border-radius:50%;filter:blur(90px);pointer-events:none;opacity:.55;will-change:transform}\n.bg-glow-1{top:-18%;left:-12%;width:64vmax;height:64vmax;background:radial-gradient(circle,rgba(0,229,255,.15),transparent 62%)}\n.bg-glow-2{bottom:-24%;right:-16%;width:58vmax;height:58vmax;background:radial-gradient(circle,rgba(0,134,179,.16),transparent 62%)}\n.bg-grid{position:fixed;inset:0;z-index:-3;pointer-events:none;\n  background-image:linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.035) 1px,transparent 1px);\n  background-size:58px 58px;\n  -webkit-mask-image:radial-gradient(120% 90% at 50% 28%,#000 0%,rgba(0,0,0,.45) 52%,transparent 82%);\n  mask-image:radial-gradient(120% 90% at 50% 28%,#000 0%,rgba(0,0,0,.45) 52%,transparent 82%)}\n#constellation{position:fixed;inset:0;z-index:-2;pointer-events:none;opacity:.9}\n\n/* ---- shared utilities ---- */\n.wrap{max-width:var(--maxw);margin:0 auto;padding:0 20px;width:100%}\n.mono{font-family:var(--f-mono);font-weight:500;letter-spacing:.18em;text-transform:uppercase;font-size:11.5px}\n.cy{color:var(--cyan)}\n.mg{color:var(--magenta)}\n.t2{color:var(--t2)}\n.t3{color:var(--t3)}\n\n/* section marker: // caption · NN */\n.mark{display:flex;align-items:center;gap:14px;margin-bottom:22px}\n.mark .cap{color:var(--cyan);white-space:nowrap}\n.mark .rule{height:1px;flex:1;background:linear-gradient(90deg,rgba(0,229,255,.4),var(--line) 40%,transparent)}\n.mark .idx{color:var(--t3);font-family:var(--f-mono);font-size:11.5px;letter-spacing:.14em}\n\n/* HUD corner brackets */\n.hud{position:relative}\n.hud::before,.hud::after{content:\"\";position:absolute;width:16px;height:16px;pointer-events:none;border:1.5px solid var(--cyan);opacity:.65;transition:opacity .4s}\n.hud::before{top:-1px;left:-1px;border-right:0;border-bottom:0}\n.hud::after{bottom:-1px;right:-1px;border-left:0;border-top:0}\n\n/* glass card */\n.glass{background:var(--glass);border:1px solid var(--line);border-radius:14px;\n  -webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);position:relative;transition:border-color .45s var(--ease),background .45s var(--ease),box-shadow .45s var(--ease),transform .45s var(--ease)}\n.glass:hover{border-color:rgba(0,229,255,.4);background:var(--glass-2);box-shadow:inset 0 0 40px rgba(0,229,255,.09),0 18px 50px -24px rgba(0,229,255,.25)}\n\n/* buttons */\n.btn{position:relative;display:inline-flex;align-items:center;justify-content:center;gap:10px;\n  font-family:var(--f-head);font-weight:600;font-size:15px;letter-spacing:-.01em;\n  padding:15px 26px;border-radius:11px;border:1px solid transparent;overflow:hidden;\n  transition:transform .18s var(--ease),box-shadow .4s var(--ease),border-color .3s,color .3s;white-space:nowrap}\n.btn-primary{background:linear-gradient(135deg,#00E5FF,#0086B3);color:#04141c;box-shadow:0 8px 30px -8px rgba(0,229,255,.5)}\n.btn-primary:hover{box-shadow:0 12px 42px -8px rgba(0,229,255,.7)}\n.btn-ghost{background:rgba(255,255,255,.02);color:var(--t1);border-color:var(--line)}\n.btn-ghost:hover{border-color:rgba(0,229,255,.5);color:#fff;box-shadow:inset 0 0 26px rgba(0,229,255,.08)}\n.btn-sm{padding:11px 18px;font-size:13.5px;border-radius:9px}\n.btn .shine{position:absolute;top:0;left:-140%;width:60%;height:100%;pointer-events:none;\n  background:linear-gradient(100deg,transparent,rgba(255,255,255,.45),transparent);transform:skewX(-18deg);transition:none}\n.btn:hover .shine{animation:shine .85s var(--ease)}\n@keyframes shine{to{left:150%}}\n.btn-primary::after{content:\"\";position:absolute;inset:0;border-radius:inherit;pointer-events:none;box-shadow:0 0 0 0 rgba(0,229,255,0);animation:pulseGlow 7s ease-in-out infinite}\n@keyframes pulseGlow{0%,86%,100%{box-shadow:0 0 0 0 rgba(0,229,255,0)}92%{box-shadow:0 0 0 6px rgba(0,229,255,.16)}}\n\n/* ============ HEADER ============ */\nheader.top{position:fixed;top:0;left:0;right:0;z-index:100;\n  background:rgba(7,10,18,.72);-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);\n  border-bottom:1px solid var(--line-2);transition:background .3s,border-color .3s}\n.nav{display:flex;align-items:center;gap:20px;height:66px}\n.logo{font-family:var(--f-head);font-weight:700;font-size:17px;letter-spacing:-.02em;display:flex;align-items:center;gap:10px}\n.logo .dot{width:9px;height:9px;border-radius:50%;background:var(--cyan);box-shadow:0 0 10px var(--cyan);flex:none}\n.logo b{font-weight:700}\n.nav-links{display:none;gap:28px;margin-left:auto;align-items:center}\n.nav-links a{font-size:14px;color:var(--t2);font-weight:500;transition:color .25s;position:relative;padding:4px 0}\n.nav-links a::after{content:\"\";position:absolute;left:0;right:100%;bottom:-2px;height:1px;background:var(--cyan);transition:right .3s var(--ease)}\n.nav-links a:hover{color:#fff}\n.nav-links a:hover::after{right:0}\n.nav-cta{margin-left:auto}\n@media(min-width:900px){.nav-links{display:flex}.nav-cta{margin-left:0}}\n\n/* ============ SALES BAR ============ */\n.salesbar{position:fixed;top:66px;left:0;right:0;z-index:90;\n  background:linear-gradient(90deg,rgba(10,14,24,.95),rgba(12,17,30,.95));\n  border-bottom:1px solid rgba(0,229,255,.18);\n  box-shadow:0 10px 30px -18px rgba(0,229,255,.4);\n  transform:translateY(-115%);transition:transform .5s var(--ease-out)}\n.salesbar.show{transform:translateY(0)}\n.salesbar-in{display:flex;align-items:center;gap:16px;padding:9px 20px;max-width:var(--maxw);margin:0 auto;flex-wrap:wrap;justify-content:center}\n.salesbar .txt{font-size:13px;color:var(--t2);display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:center;text-align:center}\n.salesbar .txt strong{color:#fff;font-weight:600}\n.salesbar .txt .seats{color:var(--magenta);font-weight:600;font-family:var(--f-mono);font-size:12px;letter-spacing:.04em}\n.salesbar .spacer{flex:1;min-width:0}\n\n/* ============ SECTIONS ============ */\nmain{position:relative;z-index:1}\nsection.sec{padding:74px 0;position:relative;scroll-margin-top:88px}\n.sec-head{max-width:820px}\n.sec h2{font-size:clamp(28px,6vw,50px);margin-bottom:0}\n.lead{color:var(--t2);font-size:clamp(15px,2.4vw,18px);line-height:1.62;margin-top:22px;max-width:780px}\n.lead b,.lead strong{color:var(--t1);font-weight:600}\n\n/* reveal choreography */\n.rv{opacity:0;transform:translateY(26px);transition:opacity .7s var(--ease-out),transform .7s var(--ease-out);transition-delay:calc(var(--d,0)*80ms)}\n.sec.in .rv,.in>.rv,.rv.show{opacity:1;transform:none}\n.rise{overflow:hidden;display:block}\n.rise>span{display:block;transform:translateY(115%);transition:transform .8s var(--ease-out);transition-delay:calc(var(--d,0)*70ms + 60ms)}\n.sec.in .rise>span,.in .rise>span{transform:none}\n\n/* ============ HERO ============ */\n.hero{padding-top:150px;padding-bottom:56px;position:relative;overflow:hidden}\n.scan{position:absolute;left:0;right:0;top:0;height:26vh;z-index:5;pointer-events:none;\n  background:linear-gradient(180deg,rgba(0,229,255,.22),rgba(0,229,255,.02) 60%,transparent);\n  transform:translateY(-120%);opacity:0}\n.scan .line{position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--cyan);box-shadow:0 0 22px 3px var(--cyan)}\n.booted .scan{animation:scanSweep .62s var(--ease) forwards}\n@keyframes scanSweep{0%{transform:translateY(-120%);opacity:1}82%{opacity:1}100%{transform:translateY(430%);opacity:0}}\n\n.plaque{display:inline-flex;align-items:center;gap:11px;padding:9px 16px;border-radius:100px;\n  border:1px solid rgba(0,229,255,.3);background:rgba(0,229,255,.05);font-family:var(--f-mono);\n  font-size:11.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--t2);\n  opacity:0;transform:translateY(14px)}\n.plaque .liv{width:7px;height:7px;border-radius:50%;background:var(--magenta);box-shadow:0 0 9px var(--magenta);animation:blip 2.4s ease-in-out infinite}\n@keyframes blip{0%,100%{opacity:1}50%{opacity:.35}}\n.plaque .seats{color:var(--magenta);font-weight:600}\n\nh1.hero-h1{font-size:clamp(31px,6.6vw,68px);font-weight:800;line-height:1.05;margin:26px 0 0;max-width:16ch;letter-spacing:-.03em}\n.hero-h1 .w{display:inline-block;opacity:0;transform:translateY(20px) rotateX(-40deg);transform-origin:bottom;transition:opacity .5s var(--ease),transform .5s var(--ease)}\n.hero-h1 .w.lit{opacity:1;transform:none}\n.hero-h1 .w-sm{font-size:.4em;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:#7defff;text-shadow:0 0 16px rgba(0,229,255,.5),0 2px 18px rgba(0,0,0,.65);margin-top:.4em}\n.hero-h1 .w-sm2{color:#ff5fb0;text-shadow:0 0 16px rgba(255,46,154,.55),0 2px 18px rgba(0,0,0,.65)}\n.hero-h1 .glitch{color:var(--cyan);position:relative;display:inline-block}\n.hero-h1 .glitch.go::before,.hero-h1 .glitch.go::after{content:\"ИИ\";position:absolute;left:0;top:0;width:100%;overflow:hidden}\n.hero-h1 .glitch.go::before{color:var(--magenta);animation:glitchA .4s steps(2) 3;clip-path:inset(0 0 55% 0)}\n.hero-h1 .glitch.go::after{color:#7df9ff;animation:glitchB .4s steps(2) 3;clip-path:inset(55% 0 0 0)}\n@keyframes glitchA{0%{transform:translate(0)}50%{transform:translate(-3px,-1px)}100%{transform:translate(2px,1px)}}\n@keyframes glitchB{0%{transform:translate(0)}50%{transform:translate(3px,1px)}100%{transform:translate(-2px,-1px)}}\n\n.hero-sub{color:var(--t2);font-size:clamp(15px,2.5vw,18.5px);line-height:1.6;margin-top:26px;max-width:60ch;opacity:0;transform:translateY(16px)}\n.hero-date{display:inline-flex;align-items:flex-start;gap:11px;margin-top:24px;padding:12px 17px;border-radius:12px;\n  border:1px solid var(--line);background:var(--glass);font-size:14px;color:var(--t2);opacity:0;transform:translateY(16px)}\n.hero-date svg{flex:none;margin-top:2px;color:var(--cyan)}\n.hero-date b{color:var(--t1);font-weight:600}\n.hero-cta{display:flex;gap:14px;margin-top:30px;flex-wrap:wrap;opacity:0;transform:translateY(16px)}\n\n.booted .plaque{animation:matUp .55s var(--ease-out) .15s forwards}\n.booted .hero-sub{animation:matUp .6s var(--ease-out) 1.05s forwards}\n.booted .hero-date{animation:matUp .6s var(--ease-out) 1.15s forwards}\n.booted .hero-cta{animation:matUp .6s var(--ease-out) 1.25s forwards}\n.booted .timer-wrap{animation:matUp .6s var(--ease-out) 1.35s forwards}\n@keyframes matUp{to{opacity:1;transform:none}}\n\n/* hero foot — date ↔ caption (row 1), CTA ↔ countdown (row 2): levels aligned */\n.hero-foot{display:grid;grid-template-columns:auto auto;justify-content:space-between;justify-items:start;al          ctx.strokeStyle = 'rgba(0,229,255,'+al.toFixed(3)+')';\n            ctx.lineWidth = 1;\n            ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();\n          }\n        }\n      }\n      // nodes\n      for(var k=0;k<nodes.length;k++){\n        var n = nodes[k];\n        ctx.beginPath();\n        ctx.arc(n.x, n.y, 1.7, 0, 6.283);\n        ctx.fillStyle = 'rgba(120,235,255,.85)';\n        ctx.fill();\n      }\n      // ripples\n      for(var r=ripples.length-1;r>=0;r--){\n        var rp = ripples[r]; rp.rad += 6; rp.a *= 0.94;\n        ctx.strokeStyle = 'rgba(0,229,255,'+rp.a.toFixed(3)+')';\n        ctx.lineWidth = 1.5;\n        ctx.beginPath(); ctx.arc(rp.x, rp.y, rp.rad, 0, 6.283); ctx.stroke();\n        if(rp.a < 0.02) ripples.splice(r,1);\n      }\n    }\n    function step(){\n      for(var i=0;i<nodes.length;i++){\n        var n = nodes[i];\n        n.x += n.vx; n.y += n.vy;\n        if(n.x < 0 || n.x > W) n.vx *= -1;\n        if(n.y < 0 || n.y > H) n.vy *= -1;\n        // cursor attraction within 120px\n        var dx = mouse.x - n.x, dy = mouse.y - n.y, d = Math.hypot(dx,dy);\n        if(d < 120 && d > 0.5){ var f = (1 - d/120)*0.6; n.x += dx/d*f; n.y += dy/d*f; }\n      }\n      draw();\n      if(running) requestAnimationFrame(step);\n    }\n    resize();\n    window.addEventListener('resize', resize);\n    if(coarse || reduce){\n      draw(); // static constellation on mobile / reduced motion\n    } else {\n      window.addEventListener('mousemove', function(e){ mouse.x = e.clientX; mouse.y = e.clientY; });\n      window.addEventListener('mouseout', function(){ mouse.x = -9999; mouse.y = -9999; });\n      window.addEventListener('click', function(e){\n        if(e.target.closest('button, a, input, select, label, .modal-card')) { /* still ripple, but avoid over-triggering */ }\n        ripples.push({ x:e.clientX, y:e.clientY, rad:4, a:0.55 });\n        // impulse to nearby nodes\n        nodes.forEach(function(n){\n          var dx = n.x - e.clientX, dy = n.y - e.clientY, d = Math.hypot(dx,dy);\n          if(d < 160 && d > 0.5){ var f = (1 - d/160)*2.4; n.vx += dx/d*f*0.12; n.vy += dy/d*f*0.12; }\n        });\n      });\n      requestAnimationFrame(step);\n      // pause when tab hidden\n      document.addEventListener('visibilitychange', function(){\n        running = !document.hidden;\n        if(running) requestAnimationFrame(step);\n      });\n    }\n  })();\n\n  /* ---------- FINAL converging canvas ---------- */\n  var finalStarted = false;\n  function startFinalCanvas(){\n    if(finalStarted) return; finalStarted = true;\n    var canvas = $('#final-canvas'); if(!canvas) return;\n    var ctx = canvas.getContext('2d');\n    var sec = $('#final'), DPR = Math.min(window.devicePixelRatio||1, 2);\n    var W,H, lines = [], target = {x:0,y:0}, run = true;\n    function size(){\n      var r = sec.getBoundingClientRect();\n      W = r.width; H = r.height;\n      canvas.width = W*DPR; canvas.height = H*DPR;\n      canvas.style.width = W+'px'; canvas.style.height = H+'px';\n      ctx.setTransform(DPR,0,0,DPR,0,0);\n      var btn = sec.querySelector('.final-cta .btn');\n      var br = btn ? btn.getBoundingClientRect() : {left:W/2, top:H*0.7, width:0, height:0};\n      var sr = sec.getBoundingClientRect();\n      target.x = br.left - sr.left + br.width/2;\n      target.y = br.top - sr.top + br.height/2;\n      build();\n    }\n    function build(){\n      lines = [];\n      var N = coarse ? 14 : 26;\n      for(var i=0;i<N;i++){\n        var edge = Math.floor(Math.random()*4), x,y;\n        if(edge===0){ x=Math.random()*W; y=0; }\n        else if(edge===1){ x=W; y=Math.random()*H; }\n        else if(edge===2){ x=Math.random()*W; y=H; }\n        else { x=0; y=Math.random()*H; }\n        lines.push({ x0:x, y0:y, t:Math.random(), sp:0.003+Math.random()*0.004 });\n      }\n    }\n    function frame(){\n      ctx.clearRect(0,0,W,H);\n      lines.forEach(function(l){\n        ctx.strokeStyle = 'rgb
